# Capacitor: cache JS + native tooling, build unsigned debug artifacts, upload securely.
# Signing keys and keystores must NEVER be committed — use GitHub Actions encrypted secrets
# (or your org’s secret store) and write them to ephemeral files in a dedicated step.
#
# Optional secrets (release signing — not used by debug jobs below):
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#   APPLE_*, MATCH_*, etc. — inject via step env, not repo files.

name: Capacitor mobile

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'plant-swipe/**'
      - '.github/workflows/capacitor-mobile.yml'

concurrency:
  group: capacitor-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cap-sync-and-web:
    name: Web build + cap sync (CI-safe)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plant-swipe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-cache-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            bun-install-cache-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: plant-swipe/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PWA
        run: bun run build:web
        env:
          SKIP_SITEMAP_GENERATION: '1'

      - name: Capacitor sync (no IDE)
        run: bun run cap:ci:sync

  android-debug:
    name: Android debug APK (unsigned)
    runs-on: ubuntu-latest
    needs: cap-sync-and-web
    if: ${{ hashFiles('plant-swipe/android/settings.gradle') != '' }}
    defaults:
      run:
        working-directory: plant-swipe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-cache-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            bun-install-cache-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: plant-swipe/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            plant-swipe/android/.gradle
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('plant-swipe/android/**/*.gradle*', 'plant-swipe/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PWA + cap sync
        run: bun run build:cap
        env:
          SKIP_SITEMAP_GENERATION: '1'

      - uses: android-actions/setup-android@v3

      - name: Assemble debug
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK (GitHub retains artifacts encrypted at rest; use short retention for test builds)
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: plant-swipe/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  ios-debug:
    name: iOS debug build (macOS)
    runs-on: macos-14
    needs: cap-sync-and-web
    if: ${{ hashFiles('plant-swipe/ios/App/Podfile') != '' }}
    defaults:
      run:
        working-directory: plant-swipe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-cache-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            bun-install-cache-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: plant-swipe/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: plant-swipe/ios/App/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('plant-swipe/ios/App/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PWA + cap sync
        run: bun run build:cap
        env:
          SKIP_SITEMAP_GENERATION: '1'

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Pod install
        run: cd ios/App && pod install

      - name: Build iOS (Debug / simulator, codesign disabled for CI artifact)
        run: |
          cd ios/App
          DERIVED="${GITHUB_WORKSPACE}/plant-swipe/ios-derived-ci"
          rm -rf "$DERIVED"
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload simulator build (DerivedData; short retention — not for App Store)
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-deriveddata
          path: plant-swipe/ios-derived-ci
          if-no-files-found: warn
          retention-days: 14
