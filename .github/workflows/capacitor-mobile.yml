# Capacitor: cache JS + native tooling, build Android + iOS artifacts.
# Signing keys must NOT be committed — use GitHub Actions secrets for store builds.
#
# Optional secrets:
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#   APPLE_*, MATCH_*, etc.

name: Capacitor mobile

on:
  workflow_dispatch:
    inputs:
      api_origin_debug:
        description: 'API server for debug builds'
        required: false
        default: 'https://dev01.aphylia.app'
        type: string
      api_origin_release:
        description: 'API server for release builds'
        required: false
        default: 'https://aphylia.app'
        type: string
  # Main-branch builds run AFTER Auto Version Increment completes so the bumped
  # version in package.json / capacitor.config.json / native projects is actually
  # compiled into the APK / IPA. Running on `push` here would race the bump job.
  workflow_run:
    workflows: ["Auto Version Increment"]
    types: [completed]
    branches: [main]
  pull_request:
    paths:
      - 'plant-swipe/android/**'
      - 'plant-swipe/ios/**'
      - 'plant-swipe/capacitor.config.*'
      - 'plant-swipe/package.json'
      - 'plant-swipe/bun.lock'
      - 'plant-swipe/scripts/sync-native-version.mjs'
      - 'plant-swipe/scripts/cap-ci-sync.mjs'
      - 'plant-swipe/scripts/assert-capacitor-store-bundle.mjs'
      - '.github/workflows/capacitor-mobile.yml'

concurrency:
  group: capacitor-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cap-sync-and-web:
    name: Web build + cap sync (CI-safe)
    runs-on: ubuntu-latest
    # Skip if the upstream Auto Version Increment run failed — building stale
    # code with a half-applied bump would just reintroduce the mismatch.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    outputs:
      has-android: ${{ steps.detect-platforms.outputs.has-android }}
      has-ios: ${{ steps.detect-platforms.outputs.has-ios }}
    defaults:
      run:
        working-directory: plant-swipe
    steps:
      # For workflow_run triggers actions/checkout defaults to the SHA that started
      # the upstream run (the PR merge commit, pre-bump). Pin to main so we pick up
      # the version bump commit that Auto Version Increment just pushed.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}

      - name: Detect native platforms
        id: detect-platforms
        run: |
          if [ -f android/settings.gradle ]; then
            echo "has-android=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-android=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f ios/App/App.xcodeproj/project.pbxproj ]; then
            echo "has-ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-ios=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-cache-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            bun-install-cache-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: plant-swipe/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PWA
        run: bun run build:web
        env:
          SKIP_SITEMAP_GENERATION: '1'

      - name: Capacitor sync (no IDE)
        env:
          NATIVE_BUILD_NUMBER: ${{ github.run_number }}
        run: bun run cap:ci:sync

  android-debug:
    name: Android debug APK
    runs-on: ubuntu-latest
    needs: cap-sync-and-web
    if: needs.cap-sync-and-web.outputs.has-android == 'true'
    defaults:
      run:
        working-directory: plant-swipe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-cache-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            bun-install-cache-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: plant-swipe/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            plant-swipe/android/.gradle
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('plant-swipe/android/**/*.gradle*', 'plant-swipe/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PWA + cap sync
        run: bun run build:cap
        env:
          VITE_API_ORIGIN: ${{ inputs.api_origin_debug || 'https://dev01.aphylia.app' }}
          SKIP_SITEMAP_GENERATION: '1'
          NATIVE_BUILD_NUMBER: ${{ github.run_number }}

      - uses: android-actions/setup-android@v3

      - name: Assemble debug
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: plant-swipe/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  android-release:
    name: Android release APK (signed in CI)
    runs-on: ubuntu-latest
    needs: cap-sync-and-web
    if: needs.cap-sync-and-web.outputs.has-android == 'true'
    defaults:
      run:
        working-directory: plant-swipe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: plant-swipe/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            plant-swipe/android/.gradle
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('plant-swipe/android/**/*.gradle*', 'plant-swipe/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PWA + cap sync
        run: bun run build:cap
        env:
          VITE_API_ORIGIN: ${{ inputs.api_origin_release || 'https://aphylia.app' }}
          SKIP_SITEMAP_GENERATION: '1'
          NATIVE_BUILD_NUMBER: ${{ github.run_number }}

      - uses: android-actions/setup-android@v3

      - name: Prepare keystore (org secret or ephemeral CI key)
        working-directory: plant-swipe/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > ci-release.jks
            echo "KEYSTORE_PATH=$(pwd)/ci-release.jks" >> "$GITHUB_ENV"
            echo "KEYSTORE_PASS=${ANDROID_KEYSTORE_PASSWORD}" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> "$GITHUB_ENV"
            echo "KEY_PASS=${ANDROID_KEY_PASSWORD}" >> "$GITHUB_ENV"
          else
            keytool -genkeypair -v -keystore ci-ephemeral.jks -alias ci -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass ci-ci-ci -keypass ci-ci-ci \
              -dname "CN=GitHub Actions CI, OU=Mobile, O=Aphylia, L=NA, S=NA, C=US"
            echo "KEYSTORE_PATH=$(pwd)/ci-ephemeral.jks" >> "$GITHUB_ENV"
            echo "KEYSTORE_PASS=ci-ci-ci" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=ci" >> "$GITHUB_ENV"
            echo "KEY_PASS=ci-ci-ci" >> "$GITHUB_ENV"
            echo "::warning::Using ephemeral debug keystore — not for Play Store upload. Set ANDROID_* secrets for real signing."
          fi

      - name: Assemble release
        working-directory: plant-swipe/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="${KEYSTORE_PATH}" \
            -Pandroid.injected.signing.store.password="${KEYSTORE_PASS}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASS}"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: plant-swipe/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

  ios-simulator:
    name: iOS Simulator build (macOS)
    runs-on: macos-15
    needs: cap-sync-and-web
    if: needs.cap-sync-and-web.outputs.has-ios == 'true'
    defaults:
      run:
        working-directory: plant-swipe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}

      - name: Select Xcode 26
        run: |
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          else
            LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
            [ -n "$LATEST" ] && sudo xcode-select -s "$LATEST/Contents/Developer"
          fi
          xcodebuild -version

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: plant-swipe/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('plant-swipe/bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PWA + cap sync
        run: bun run build:cap
        env:
          VITE_API_ORIGIN: ${{ inputs.api_origin_debug || 'https://dev01.aphylia.app' }}
          SKIP_SITEMAP_GENERATION: '1'
          NATIVE_BUILD_NUMBER: ${{ github.run_number }}

      - name: Resolve SPM dependencies
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath "${GITHUB_WORKSPACE}/plant-swipe/spm-cache"

      - name: Build for iOS Simulator (no code signing)
        run: |
          cd ios/App
          DERIVED="${GITHUB_WORKSPACE}/plant-swipe/ios-derived-ci"
          rm -rf "$DERIVED"
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED" \
            -clonedSourcePackagesDirPath "${GITHUB_WORKSPACE}/plant-swipe/spm-cache" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip Simulator .app
        run: |
          APP=$(find ios-derived-ci -name 'App.app' -type d | head -1)
          if [[ -z "$APP" ]]; then echo "App.app not found"; exit 1; fi
          ditto -c -k --sequesterRsrc --keepParent "$APP" ios-simulator-App.zip

      - name: Upload iOS Simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: plant-swipe/ios-simulator-App.zip
          if-no-files-found: error
          retention-days: 14

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [android-debug, android-release]
    # Releases cut from main either (a) after Auto Version Increment completes
    # the bump, or (b) on a manual Run workflow against main. `needs` already
    # guarantees both APK builds succeeded, so no extra success check is needed.
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./plant-swipe/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: artifacts/debug

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: artifacts/release

      - name: Rename APKs with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for apk in artifacts/debug/*.apk; do
            mv "$apk" "artifacts/PlantSwipe-v${VERSION}-debug.apk"
          done
          for apk in artifacts/release/*.apk; do
            mv "$apk" "artifacts/PlantSwipe-v${VERSION}-release.apk"
          done

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PlantSwipe ${{ steps.version.outputs.tag }}
          body: |
            ## PlantSwipe ${{ steps.version.outputs.tag }}

            **Automated release from CI build #${{ github.run_number }}**

            ### Downloads
            - **Release APK** — signed build for testing/distribution
            - **Debug APK** — debug build with developer tools enabled

            ### Commit
            ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/PlantSwipe-*.apk
          make_latest: true
